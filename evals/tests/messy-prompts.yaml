# 30 messy prompts: 10 vague, 5 emotional, 5 writing, 5 decision, 5 long messy.
# Assertions use local checks only — no external API required.
# Pass threshold: output-quality score >= 0.45 AND length > 30 chars.

# ── 10 Vague prompts ──────────────────────────────────────────────────────────

- vars:
    prompt: "make this better"
  assert:
    - type: javascript
      value: "output.length > 30"
    - type: file://assertions/output-quality.js

