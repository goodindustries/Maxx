# ── 5 Emotional prompts ───────────────────────────────────────────────────────

- vars:
    prompt: "my coworker is being really unfair and i need to address it without making things worse"
  assert:
    - type: javascript
      value: "output.length > 50"
    - type: javascript
      value: "/\\b(professional|direct|calm|tone|message|conversation)\\b/i.test(output)"
    - type: file://assertions/output-quality.js

- vars:
    prompt: "i want to quit but i cant afford to right now"
  assert:
    - type: javascript
      value: "output.length > 50"
    - type: javascript
      value: "/\\b(option|plan|budget|timeline|next|step)\\b/i.test(output)"
    - type: file://assertions/output-quality.js

- vars:
    prompt: "my boss just embarrassed me in front of the whole team and i need to respond professionally"
  assert:
    - type: javascript
      value: "output.length > 50"
    - type: javascript
      value: "/\\b(professional|calm|tone|response|message|direct)\\b/i.test(output)"
    - type: file://assertions/output-quality.js

- vars:
