# maxx landing page — static, no build step
[build]
  publish = "site"
  command = ""

# live cards: /u/<handle> renders fresh from the tally server on every hit.
# force=true so the old static site/u/* snapshots can't shadow the live page.
[[redirects]]
  from = "/u/*"
  to = "https://api.meetmaxx.co/u/:splat"
  status = 200
  force = true

# short installer URL: `curl -fsSL https://meetmaxx.co/install | bash`
# proxies to the repo's install.sh (single source of truth, no duplicated file).
[[redirects]]
  from = "/install"
  to = "https://raw.githubusercontent.com/goodindustries/Maxx/main/maxx/install.sh"
  status = 200
  force = true

