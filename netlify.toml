# maxx landing page — static, no build step
[build]
  publish = "site"
  command = ""

# short installer URL: `curl -fsSL https://meetmaxx.co/install | bash`
# proxies to the repo's install.sh (single source of truth, no duplicated file).
[[redirects]]
  from = "/install"
  to = "https://raw.githubusercontent.com/goodindustries/Maxx/main/maxx/install.sh"
  status = 200
  force = true

# maxx budget tally — meetmaxx.co is the SERVICE; lucky is just the hardware.
# Front the tally's API + MCP surface behind the meetmaxx.co identity.
[[redirects]]
  from = "/mcp"
  to = "https://luckymachines.co/maxxbudget/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://luckymachines.co/maxxbudget/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://luckymachines.co/maxxbudget/health"
  status = 200
  force = true
